name: AFM CLI

on:
  pull_request:
    branches: [main]
    paths:
      - 'Tools/AFMCLI/**'
      - 'FoundationLabCore/**'
      - 'Packages/AFMServer/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint-core-cli.yml'
      - '.github/scripts/verify-afm-artifact.sh'
      - '.github/workflows/afm-cli.yml'
      - '.github/workflows/afm-release.yml'
  push:
    branches: [main]
    paths:
      - 'Tools/AFMCLI/**'
      - 'FoundationLabCore/**'
      - 'Packages/AFMServer/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint-core-cli.yml'
      - '.github/scripts/verify-afm-artifact.sh'
      - '.github/workflows/afm-cli.yml'
      - '.github/workflows/afm-release.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: afm-cli-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Core, CLI, and AFMServer
        run: swiftlint lint --strict --config .swiftlint-core-cli.yml

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build CLI
        run: swift build --product afm

      - name: Run deterministic package tests
        run: |
          swift test \
            --skip 'AFMCLITests\.(feedbackExportCreatesNestedDirectories|streamingJSONEmitsEvents|modelCommandsReturnStructuredJSON)'

      - name: Test standalone AFMServer package
        run: swift test --package-path Packages/AFMServer

  universal-artifact:
    needs: build-and-test
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show artifact toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build universal release binary
        run: |
          rm -rf .build-release build
          swift build \
            -c release \
            --arch arm64 \
            --arch x86_64 \
            --product afm \
            --scratch-path .build-release
          AFM_BIN_PATH="$(swift build \
            -c release \
            --arch arm64 \
            --arch x86_64 \
            --product afm \
            --scratch-path .build-release \
            --show-bin-path)"
          mkdir -p build
          cp "$AFM_BIN_PATH/afm" build/afm_dev_macOS_universal
          chmod +x build/afm_dev_macOS_universal

      - name: Verify universal artifact
        env:
          AFM_EXPECTED_MACOS_MINIMUM: '26.0'
        run: bash .github/scripts/verify-afm-artifact.sh build/afm_dev_macOS_universal

      - name: Test the packaged binary
        env:
          AFM_TEST_BINARY: ${{ github.workspace }}/build/afm_dev_macOS_universal
        run: |
          swift test \
            --filter 'AFMCLITests\.(rootHelpShowsGroupedCommands|rootDryRun|discoveryCommandsHonorDryRun|validationErrorsAreDeterministic)'

      - name: Write artifact checksum
        run: |
          shasum -a 256 build/afm_dev_macOS_universal > build/afm_dev_checksums.txt

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: afm-cli
          path: build/
