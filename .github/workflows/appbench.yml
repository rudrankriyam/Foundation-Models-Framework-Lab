name: AppBench

on:
  pull_request:
    branches: [main]
    paths:
      - 'Tools/AppBench/**'
      - 'Foundation Lab/Models/ExpertWorkspace*.swift'
      - 'Foundation Lab/Models/ExperimentTemplate*.swift'
      - 'Foundation Lab/Views/AppBenchStudioContent.swift'
      - 'Foundation Lab/Views/ExpertWorkspaceView.swift'
      - 'Foundation Lab/Views/Library/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/appbench.yml'
  push:
    branches: [main]
    paths:
      - 'Tools/AppBench/**'
      - 'Foundation Lab/Models/ExpertWorkspace*.swift'
      - 'Foundation Lab/Models/ExperimentTemplate*.swift'
      - 'Foundation Lab/Views/AppBenchStudioContent.swift'
      - 'Foundation Lab/Views/ExpertWorkspaceView.swift'
      - 'Foundation Lab/Views/Library/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/appbench.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: appbench-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint AppBench
        working-directory: Tools/AppBench
        run: swiftlint lint --strict

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build canonical CLI
        run: swift build --product appbench

      - name: Validate CLI wrapper
        run: ./Tools/AppBench/appbench list

      - name: Test root package integration
        run: swift test --filter AppBench

      - name: Test nested package
        run: swift test --package-path Tools/AppBench/BenchmarkCore

      - name: Build release CLI
        run: swift build -c release --product appbench

      - name: Build physical-device harness for Simulator validation
        run: |
          xcodebuild \
            -project Tools/AppBench/AppBenchDeviceRunner/AppBenchDeviceRunner.xcodeproj \
            -scheme AppBenchDeviceRunner \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
