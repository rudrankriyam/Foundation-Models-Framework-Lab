name: FMFBench

on:
  pull_request:
    branches: [main]
    paths:
      - 'Tools/FMFBench/**'
      - 'Foundation Lab/Models/ExpertWorkspace*.swift'
      - 'Foundation Lab/Models/ExperimentTemplate*.swift'
      - 'Foundation Lab/Views/FMFBenchStudioContent.swift'
      - 'Foundation Lab/Views/ExpertWorkspaceView.swift'
      - 'Foundation Lab/Views/Library/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/fmfbench.yml'
  push:
    branches: [main]
    paths:
      - 'Tools/FMFBench/**'
      - 'Foundation Lab/Models/ExpertWorkspace*.swift'
      - 'Foundation Lab/Models/ExperimentTemplate*.swift'
      - 'Foundation Lab/Views/FMFBenchStudioContent.swift'
      - 'Foundation Lab/Views/ExpertWorkspaceView.swift'
      - 'Foundation Lab/Views/Library/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/fmfbench.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fmfbench-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint FMFBench
        working-directory: Tools/FMFBench
        run: swiftlint lint --strict

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build canonical CLI
        run: swift build --product fmfbench

      - name: Validate CLI wrapper
        run: ./Tools/FMFBench/fmfbench list

      - name: Test root package integration
        run: swift test --filter FMFBench

      - name: Test nested package
        run: swift test --package-path Tools/FMFBench/BenchmarkCore

      - name: Build release CLI
        run: swift build -c release --product fmfbench

      - name: Build physical-device harness for Simulator validation
        run: |
          xcodebuild \
            -project Tools/FMFBench/FMFBenchDeviceRunner/FMFBenchDeviceRunner.xcodeproj \
            -scheme FMFBenchDeviceRunner \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
