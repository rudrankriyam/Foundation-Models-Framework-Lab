name: Release AFM CLI

on:
  push:
    tags:
      - 'afm-v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show release toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Validate release tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^afm-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::AFM release tags must match afm-vx.y.z. Got: ${TAG}"
            exit 1
          fi

          printf 'VERSION=%s\n' "${TAG#afm-v}" >> "$GITHUB_ENV"

      - name: Run release checks
        run: |
          swift build --product afm
          swift test \
            --skip 'AFMCLITests\.(feedbackExportCreatesNestedDirectories|streamingJSONEmitsEvents|modelCommandsReturnStructuredJSON)'

      - name: Build universal release binary
        run: |
          rm -rf .build-release release
          mkdir -p release
          swift build \
            -c release \
            --arch arm64 \
            --arch x86_64 \
            --product afm \
            --scratch-path .build-release
          AFM_BIN_PATH="$(swift build \
            -c release \
            --arch arm64 \
            --arch x86_64 \
            --product afm \
            --scratch-path .build-release \
            --show-bin-path)"
          cp "$AFM_BIN_PATH/afm" "release/afm_${VERSION}_macOS_universal"
          chmod +x "release/afm_${VERSION}_macOS_universal"

      - name: Verify universal release artifact
        env:
          AFM_EXPECTED_MACOS_MINIMUM: '26.0'
        run: bash .github/scripts/verify-afm-artifact.sh "release/afm_${VERSION}_macOS_universal"

      - name: Test the packaged release binary
        run: |
          AFM_TEST_BINARY="$PWD/release/afm_${VERSION}_macOS_universal" \
            swift test \
            --filter 'AFMCLITests\.(rootHelpShowsGroupedCommands|rootDryRun|discoveryCommandsHonorDryRun|validationErrorsAreDeterministic)'

      - name: Detect signing configuration
        id: signing
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_DEVELOPER_ID_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          APPLE_DEVELOPER_ID_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}
        run: |
          if [ -n "$APPLE_DEVELOPER_ID" ] && [ -n "$APPLE_DEVELOPER_ID_CERT" ] && [ -n "$APPLE_DEVELOPER_ID_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect tap publishing configuration
        id: tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -n "$TAP_GITHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple certificate
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_PASSWORD }}

      - name: Sign release binary
        if: ${{ steps.signing.outputs.enabled == 'true' }}
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          codesign \
            --force \
            --sign "$APPLE_DEVELOPER_ID" \
            --timestamp \
            --options=runtime \
            "release/afm_${VERSION}_macOS_universal"

      - name: Write checksum
        run: |
          shasum -a 256 "release/afm_${VERSION}_macOS_universal" \
            > "release/afm_${VERSION}_checksums.txt"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/* --generate-notes --verify-tag

      - name: Update Homebrew tap
        if: ${{ steps.tap.outputs.enabled == 'true' }}
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          export SHA256
          SHA256="$(shasum -a 256 "release/afm_${VERSION}_macOS_universal" | cut -d ' ' -f 1)"

          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/rudrankriyam/homebrew-tap.git" homebrew-tap
          cd homebrew-tap

          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          version = os.environ["VERSION"]
          sha256 = os.environ["SHA256"]
          formula = dedent(
              f"""\
              # typed: false
              # frozen_string_literal: true

              class Afm < Formula
                desc "A native CLI for Foundation Models on Apple platforms"
                homepage "https://github.com/rudrankriyam/Foundation-Models-Framework-Lab#command-line-interface"
                url "https://github.com/rudrankriyam/Foundation-Models-Framework-Lab/releases/download/afm-v{version}/afm_{version}_macOS_universal"
                version "{version}"
                sha256 "{sha256}"
                license "MIT"

                depends_on :macos

                def install
                  bin.install "afm_{version}_macOS_universal" => "afm"
                end

                test do
                  assert_match "Foundation Models", shell_output("#{bin}/afm --help")
                end
              end
              """
          )
          Path("Formula/afm.rb").write_text(formula, encoding="utf-8")
          PY

          git config user.name "Rudrank Riyam"
          git config user.email "rudrankriyam@gmail.com"
          git add Formula/afm.rb
          git commit -m "Update afm to ${VERSION}" || echo "No changes to commit"
          git push
