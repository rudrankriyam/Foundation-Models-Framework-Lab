name: FMBench

on:
  pull_request:
    branches: [main]
    paths:
      - 'Tools/FMBench/**'
      - 'Foundation Lab/Models/ExpertWorkspace*.swift'
      - 'Foundation Lab/Models/ExperimentTemplate*.swift'
      - 'Foundation Lab/Views/FMBenchStudioContent.swift'
      - 'Foundation Lab/Views/ExpertWorkspaceView.swift'
      - 'Foundation Lab/Views/Library/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/fmbench.yml'
  push:
    branches: [main]
    paths:
      - 'Tools/FMBench/**'
      - 'Foundation Lab/Models/ExpertWorkspace*.swift'
      - 'Foundation Lab/Models/ExperimentTemplate*.swift'
      - 'Foundation Lab/Views/FMBenchStudioContent.swift'
      - 'Foundation Lab/Views/ExpertWorkspaceView.swift'
      - 'Foundation Lab/Views/Library/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.github/workflows/fmbench.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fmbench-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint FMBench
        working-directory: Tools/FMBench
        run: swiftlint lint --strict

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build canonical CLI
        run: swift build --product fmbench

      - name: Validate CLI wrapper
        run: ./Tools/FMBench/fmbench list

      - name: Test root package integration
        run: swift test --filter FMBench

      - name: Test nested package
        run: swift test --package-path Tools/FMBench/BenchmarkCore

      - name: Build release CLI
        run: swift build -c release --product fmbench

      - name: Build physical-device harness for Simulator validation
        run: |
          xcodebuild \
            -project Tools/FMBench/FMBenchDeviceRunner/FMBenchDeviceRunner.xcodeproj \
            -scheme FMBenchDeviceRunner \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
